<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz | Design Quiz Console</title>
    <link rel="stylesheet" href="/styles/app.css" />
    <link rel="stylesheet" href="styles/app.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="container">
            <div>
                <h4>Quiz Runner</h4>
                <small>Take the quiz you selected.</small>
            </div>
            <div class="d-flex">
                <a href="/dashboard.html">Dashboard</a>
                <span id="user-greeting"></span>
                <button id="logout-btn">Log out</button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <div class="card">
            <div class="card-body">
                <!-- Quiz Header -->
                <div class="d-flex justify-content-between">
                    <div style="flex: 1;">
                        <h3 id="quiz-title"></h3>
                        <p id="quiz-description"></p>
                    </div>
                    <div class="text-end">
                        <span id="quiz-progress"></span>
                        <p class="text-muted">
                            Score: <span id="quiz-score">0</span>
                        </p>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div id="quiz-progress-bar"></div>

                <!-- Loading State -->
                <div id="quiz-placeholder" class="placeholder-glow mt-4">
                    <span class="placeholder col-8" style="display: block; margin-bottom: 1rem;"></span>
                    <p class="placeholder col-6" style="display: block; margin-bottom: 1.5rem;"></p>
                    <div class="d-flex gap-2" style="gap: 0.5rem;">
                        <span class="placeholder col-4" style="display: block; height: 3rem; margin-bottom: 0.5rem;"></span>
                    </div>
                </div>

                <!-- Quiz Panel -->
                <div id="quiz-panel" class="d-none mt-4">
                    <!-- Question Label and Index -->
                    <div class="d-flex justify-content-between mb-3" style="margin-bottom: 1rem;">
                        <span id="quiz-question-label"></span>
                        <span id="quiz-question-index" class="text-muted"></span>
                    </div>

                    <!-- Question Text -->
                    <h4 id="quiz-question-text" style="font-size: 1.4rem; margin-bottom: 1.5rem;"></h4>

                    <!-- Options -->
                    <div id="quiz-options" class="mt-4"></div>

                    <!-- Feedback Message -->
                    <div id="quiz-feedback"></div>

                    <!-- Navigation Buttons -->
                    <div class="d-flex justify-content-end mt-4" style="margin-top: 2rem; gap: 1rem;">
                        <button id="prev-question-btn" type="button" class="quiz-nav-btn">
                            ← Previous
                        </button>
                        <button id="next-question-btn" type="button" class="quiz-nav-btn">
                            Next →
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    

    <!-- Scripts -->
    <script type="module" src="/scripts/quiz.js"></script>
</body>
</html>
