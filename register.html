<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register | Design Quiz Console</title>
      <link rel="stylesheet" href="./styles/bootstrap.css" />

    <link rel="stylesheet" href="/styles/app.css" />
  </head>
  <body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <main class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card bg-panel text-white shadow-sm">
            <div class="card-body p-5">
              <h1 class="card-title">Create an account</h1>
              <p class="text-muted">Learners can register for quizzes; admins are pre-provisioned.</p>
              <form id="register-form" class="mt-4">
                <div class="row g-3">
                  <div class="col-12 form-floating">
                    <input type="text" class="form-control bg-dark text-white border-0" id="register-name" placeholder="Full name" required />
                    <label for="register-name">Full name</label>
                  </div>
                  <div class="col-12 form-floating">
                    <input type="email" class="form-control bg-dark text-white border-0" id="register-email" placeholder="Email" required />
                    <label for="register-email">Email</label>
                  </div>
                  <div class="col-6 form-floating">
                    <input type="password" class="form-control bg-dark text-white border-0" id="register-password" placeholder="Password" required />
                    <label for="register-password">Password</label>
                  </div>
                  <div class="col-6 form-floating">
                    <input type="password" class="form-control bg-dark text-white border-0" id="register-confirm" placeholder="Confirm" required />
                    <label for="register-confirm">Confirm password</label>
                  </div>
                </div>
                <div class="mt-4">
                  <button class="btn btn-success w-100" type="submit">Register</button>
                </div>
                <div class="alert alert-danger d-none mt-3" id="register-error" role="alert"></div>
                <div class="alert alert-success d-none mt-3" id="register-success" role="alert"></div>
              </form>
              <p class="text-center text-muted mb-0 mt-3">
                Already have access? <a href="/index.html" class="text-decoration-none">Log in</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/scripts/register.js"></script>
  </body>
</html>
