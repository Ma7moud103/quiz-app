<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard | Design Quiz Console</title>
      <link rel="stylesheet" href="./styles/bootstrap.css" />

    <link rel="stylesheet" href="/styles/app.css" />
  </head>
  <body>
    <header class="bg-panel py-3 sticky-top">
      <div class="container d-flex align-items-center justify-content-between">
        <div>
          <h4 class="mb-0 text-white">Design Quiz Console</h4>
          <p class="text-muted">Play quizzes or manage questions (admin only).</p>
        </div>
        <div class="d-flex align-items-center gap-3">
          <a id="question-bank-link" class="btn btn-outline-light btn-sm" href="/question-bank.html">Question Bank</a>
          <span id="user-greeting" class="text-white"></span>
          <button id="logout-btn" class="btn btn-light btn-sm">Log out</button>
        </div>
      </div>
    </header>
    <main class="container py-5">
      <div class="row g-4 align-items-center">
        <div class="col-md-6">
          <h2 class="text-white">Available quizzes</h2>
          <p class="text-muted">Search, filter, and select a quiz to start.</p>
        </div>
        <div class="col-md-3">
          <input id="search-input" type="search" class="form-control bg-dark text-white border-0" placeholder="Search quizzes" />
        </div>
        <div class="col-md-3 text-md-end">
          <div id="active-role" class="badge text-bg-info"></div>
        </div>
      </div>
      <div id="category-filters" class="mt-4 d-flex flex-wrap gap-2"></div>
      <div id="skeleton-grid" class="row g-4 mt-4">
        <div class="col-sm-6 col-lg-4">
          <div class="placeholder-card placeholder-glow">
            <span class="placeholder col-7"></span>
            <p class="placeholder col-4 mt-3"></p>
            <div class="d-flex gap-2">
              <span class="placeholder col-3"></span>
              <span class="placeholder col-2"></span>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-lg-4">
          <div class="placeholder-card placeholder-glow">
            <span class="placeholder col-6"></span>
            <p class="placeholder col-5 mt-3"></p>
            <div class="d-flex gap-2">
              <span class="placeholder col-2"></span>
              <span class="placeholder col-3"></span>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-lg-4">
          <div class="placeholder-card placeholder-glow">
            <span class="placeholder col-5"></span>
            <p class="placeholder col-6 mt-3"></p>
            <div class="d-flex gap-2">
              <span class="placeholder col-4"></span>
              <span class="placeholder col-2"></span>
            </div>
          </div>
        </div>
      </div>
      <div id="quiz-grid" class="row g-4 mt-4 d-none"></div>
    </main>
    <script type="module" src="/scripts/dashboard.js"></script>
  </body>
</html>
