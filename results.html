<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Results | Design Quiz Console</title>
    <link rel="stylesheet" href="/styles/app.css" />
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="container">
            <div>
                <h4>Quiz Results</h4>
                <small>Review your latest run.</small>
            </div>
            <div class="d-flex">
                <a href="/dashboard.html">Dashboard</a>
                <span id="user-greeting"></span>
                <button id="logout-btn">Log out</button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <!-- Results Card -->
        <div id="result-card" class="card">
            <div class="card-body">
                <div id="result-content" class="placeholder-glow"></div>
            </div>
        </div>

        <!-- Review Container -->
        <div id="review-container" class="card d-none">
            <div class="card-body">
                <h5>Quiz review</h5>
                <div id="review-list" class="d-flex"></div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex justify-content-between" style="margin-top: 1.5rem; gap: 1rem;">
            <button id="review-btn" type="button" disabled>Review quiz</button>
            <a href="/dashboard.html" class="btn btn-success">Back to dashboard</a>
        </div>
    </main>

    <!-- Scripts -->
    <script type="module" src="/scripts/results.js"></script>
</body>
</html>
